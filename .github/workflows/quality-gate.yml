name: Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-scope:
    name: Check Change Scope
    runs-on: ubuntu-latest
    outputs:
      run_mutations: ${{ steps.scope.outputs.run_mutations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count service-layer changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -cE '^(backend/services/|backend/api/|backend/providers/|backend/workers/|src/hooks/|src/components/|src/app/)' \
            || true)
          echo "Service-layer files changed: $CHANGED"
          if [ "$CHANGED" -ge 5 ]; then
            echo "run_mutations=true" >> "$GITHUB_OUTPUT"
            echo "Triggering mutation testing ($CHANGED service files changed, threshold 5)"
          else
            echo "run_mutations=false" >> "$GITHUB_OUTPUT"
            echo "Skipping mutation testing ($CHANGED service files changed, threshold 5)"
          fi

  mutation-frontend:
    name: Mutation Testing (Frontend)
    needs: check-scope
    if: needs.check-scope.outputs.run_mutations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Stryker mutation testing
        run: pnpm mutation:frontend

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-frontend-report
          path: reports/mutation/
          retention-days: 7

  mutation-backend:
    name: Mutation Testing (Backend)
    needs: check-scope
    if: needs.check-scope.outputs.run_mutations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd backend && uv sync --all-extras

      - name: Run mutmut mutation testing
        # continue-on-error: mutmut v3.5 scans system Python paths (llvm-18 dist-packages)
        # and hits broken symlinks on Ubuntu GitHub Actions runners. This is a mutmut bug;
        # the results step below still shows mutation scores for review.
        continue-on-error: true
        run: cd backend && uv run mutmut run

      - name: Show mutmut results
        if: always()
        run: cd backend && uv run mutmut results

      - name: Enforce mutation score threshold
        if: always()
        run: |
          cd backend && python - <<'PYEOF'
          import sqlite3, sys
          THRESHOLD = 55
          try:
              conn = sqlite3.connect(".mutmut-cache")
              rows = dict(conn.execute("SELECT status, COUNT(*) FROM mutant GROUP BY status").fetchall())
              killed = rows.get("killed", 0)
              survived = rows.get("survived", 0)
              total = killed + survived
              if total == 0:
                  print("No mutants recorded — skipping threshold check (mutmut env issue)")
                  sys.exit(0)
              score = killed / total * 100
              print(f"Mutation score: {score:.1f}% ({killed}/{total} killed)")
              if score < THRESHOLD:
                  print(f"FAIL: {score:.1f}% below threshold {THRESHOLD}%")
                  sys.exit(1)
              print(f"PASS: {score:.1f}% meets threshold {THRESHOLD}%")
          except Exception as e:
              print(f"Could not read mutation cache ({e}) — skipping threshold check")
              sys.exit(0)
          PYEOF

  # E2E smoke tests — commented out until staging env or docker-compose is available.
  # Currently runs locally only via /e2e-smoke skill.
  #
  # e2e-smoke:
  #   name: E2E Smoke Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Setup Node + Playwright
  #       ...
  #     - name: Start services
  #       ...
  #     - name: Run Playwright tests
  #       ...
